<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c0f;
  --text: #e8eaed;
  --text-dim: #8b919a;
  --text-muted: #5c6370;
  --green: #7ceb4b;
  --orange: #f5a623;
  --red: #f45866;
  --grey: #2a2f38;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html, body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

main {
  max-width: none;
  margin: 0;
  padding: 48px 16px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 56px;
  gap: 16px;
  flex-wrap: wrap;
}

h1 {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.range {
  display: flex;
  gap: 4px;
  background: #13161b;
  padding: 4px;
  border-radius: 8px;
}
.range button {
  background: none;
  border: none;
  color: var(--text-dim);
  font: 500 12px/1 var(--mono);
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.range button:hover { color: var(--text); }
.range button.active {
  background: #1a1e25;
  color: var(--text);
}

.graph {
  margin-bottom: 56px;
}

.graph-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.graph-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 500;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--grey);
  transition: background .2s;
}
.dot.up { background: var(--green); box-shadow: 0 0 12px rgba(124,235,75,.5); }
.dot.slow { background: var(--orange); box-shadow: 0 0 12px rgba(245,166,35,.5); }
.dot.down { background: var(--red); box-shadow: 0 0 12px rgba(244,88,102,.5); }

.graph-status {
  font: 500 12px/1 var(--mono);
  color: var(--text-dim);
}

.bars {
  display: flex;
  gap: 2px;
  height: 38px;
  align-items: stretch;
  margin-bottom: 14px;
}

.bar {
  flex: 1;
  min-width: 0;
  border-radius: 2px;
  background: var(--grey);
  transition: opacity .15s;
  cursor: default;
}
.bar.green { background: var(--green); }
.bar.orange { background: var(--orange); }
.bar.red { background: var(--red); }
.bar:hover { opacity: .7; }

.stats {
  display: flex;
  gap: 32px;
  font: 400 12px/1 var(--mono);
  color: var(--text-muted);
}
.stat .v {
  color: var(--text);
  font-weight: 500;
  margin-left: 6px;
}

footer {
  margin-top: 80px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
}

[data-tip] {
  position: relative;
}
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1e25;
  border: 1px solid var(--grey);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font: 400 11px/1.4 var(--mono);
  white-space: pre;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<main>
  <header>
    <h1>Net Monitor</h1>
    <div class="range" role="tablist">
      <button data-range="1h">1h</button>
      <button data-range="2h">2h</button>
      <button data-range="3h">3h</button>
      <button data-range="5h">5h</button>
      <button data-range="8h">8h</button>
      <button data-range="13h">13h</button>
      <button data-range="24h">24h</button>
      <button data-range="42d">42d</button>
    </div>
  </header>

  <section class="graph" id="g-google">
    <div class="graph-head">
      <div class="graph-title"><span class="dot"></span>Google fetch</div>
      <div class="graph-status">—</div>
    </div>
    <div class="bars"></div>
    <div class="stats">
      <div class="stat">last<span class="v" data-k="last">—</span></div>
      <div class="stat">24h<span class="v" data-k="d1">—</span></div>
      <div class="stat">42d<span class="v" data-k="d42">—</span></div>
    </div>
  </section>

  <section class="graph" id="g-online">
    <div class="graph-head">
      <div class="graph-title"><span class="dot"></span>navigator.onLine</div>
      <div class="graph-status">—</div>
    </div>
    <div class="bars"></div>
    <div class="stats">
      <div class="stat">last<span class="v" data-k="last">—</span></div>
      <div class="stat">24h<span class="v" data-k="d1">—</span></div>
      <div class="stat">42d<span class="v" data-k="d42">—</span></div>
    </div>
  </section>

  <footer>1 ping / minute · stored locally · 42-day retention</footer>
</main>

<script type="module">
const MIN = 60_000;
const RETENTION_MIN = 42 * 24 * 60;
const STORAGE_KEY = 'net-monitor-v1';
const FAST_MS = 300;
const SLOW_MS = 1000;
const TIMEOUT_MS = 3000;
const TARGET_BAR_PX = 4;
const RANGES = {
  '1h':  { minutes: 60,         maxBars: 60  },
  '2h':  { minutes: 120,        maxBars: 120 },
  '3h':  { minutes: 180,        maxBars: 180 },
  '5h':  { minutes: 300,        maxBars: 300 },
  '8h':  { minutes: 480,        maxBars: 480 },
  '13h': { minutes: 780,        maxBars: 504 },
  '24h': { minutes: 24 * 60,    maxBars: 288 },
  '42d': { minutes: RETENTION_MIN, maxBars: 504 },
};
const DEFAULT_RANGE = '24h';

const parseRange = (r) => {
  if (!r) return null;
  const m = /^(\d+)([hd])$/.exec(r);
  if (!m) return null;
  const n = parseInt(m[1], 10);
  if (!n) return null;
  const minutes = m[2] === 'h' ? n * 60 : n * 24 * 60;
  if (minutes > RETENTION_MIN) return null;
  return { minutes, maxBars: 504 };
};

const getRange = () => {
  const u = new URL(location.href);
  const r = u.searchParams.get('range');
  if (RANGES[r]) return r;
  const parsed = parseRange(r);
  if (parsed) {
    RANGES[r] = parsed;
    return r;
  }
  return DEFAULT_RANGE;
};
const setRange = (r) => {
  const u = new URL(location.href);
  u.searchParams.set('range', r);
  history.replaceState(null, '', u);
};

const slotOf = (t) => Math.floor(t / MIN);

const load = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { google: [], online: [] };
    const d = JSON.parse(raw);
    return { google: d.google || [], online: d.online || [] };
  } catch { return { google: [], online: [] }; }
};

const save = (data) => {
  const cutoff = slotOf(Date.now()) - RETENTION_MIN;
  data.google = data.google.filter(e => e.s >= cutoff);
  data.online = data.online.filter(e => e.s >= cutoff);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
};

let data = load();

const classifyGoogle = (entry) => {
  if (!entry) return null;
  if (!entry.ok) return 'red';
  if (entry.ms < FAST_MS) return 'green';
  if (entry.ms < SLOW_MS) return 'orange';
  return 'orange';
};
const classifyOnline = (entry) => {
  if (!entry) return null;
  return entry.ok ? 'green' : 'red';
};

const pingGoogle = async () => {
  const start = performance.now();
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
  try {
    await fetch('https://www.google.com/generate_204?_=' + Date.now(), {
      mode: 'no-cors',
      cache: 'no-store',
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    const ms = Math.round(performance.now() - start);
    return { s: slotOf(Date.now()), ok: true, ms };
  } catch {
    clearTimeout(timer);
    return { s: slotOf(Date.now()), ok: false, ms: Math.round(performance.now() - start) };
  }
};

const pingOnline = () => ({ s: slotOf(Date.now()), ok: navigator.onLine });

const upsert = (arr, entry) => {
  const last = arr[arr.length - 1];
  if (last && last.s === entry.s) {
    arr[arr.length - 1] = entry;
  } else {
    arr.push(entry);
  }
};

const tick = async () => {
  const [g, o] = [await pingGoogle(), pingOnline()];
  upsert(data.google, g);
  upsert(data.online, o);
  save(data);
  render();
};

const fmtTime = (slot) => {
  const d = new Date(slot * MIN);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const computeStats = (arr, classify, windowMin) => {
  const nowSlot = slotOf(Date.now());
  const cutoff = nowSlot - windowMin;
  let measured = 0, up = 0;
  for (const e of arr) {
    if (e.s < cutoff) continue;
    measured++;
    const c = classify(e);
    if (c === 'green' || c === 'orange') up++;
  }
  if (measured === 0) return '—';
  return ((up / measured) * 100).toFixed(1) + '%';
};

const SEVERITY = { red: 3, orange: 2, green: 1 };
const worstClass = (a, b) => {
  if (!a) return b;
  if (!b) return a;
  return SEVERITY[a] >= SEVERITY[b] ? a : b;
};

const renderGraph = (sectionId, arr, classify, lastFmt, range) => {
  const section = document.getElementById(sectionId);
  const barsEl = section.querySelector('.bars');
  const dot = section.querySelector('.dot');
  const statusEl = section.querySelector('.graph-status');

  const cfg = RANGES[range];
  const width = barsEl.clientWidth || 600;
  const n = Math.max(20, Math.min(cfg.maxBars, Math.floor(width / TARGET_BAR_PX)));
  const slotsPerBar = Math.max(1, Math.ceil(cfg.minutes / n));
  const totalSlots = slotsPerBar * n;

  const nowSlot = slotOf(Date.now());
  const startSlot = nowSlot - totalSlots + 1;

  const map = new Map();
  for (const e of arr) {
    if (e.s >= startSlot && e.s <= nowSlot) map.set(e.s, e);
  }

  const frag = document.createDocumentFragment();
  for (let i = 0; i < n; i++) {
    const a = startSlot + i * slotsPerBar;
    const b = a + slotsPerBar - 1;
    let cls = null;
    let measured = 0, fail = 0, slowCount = 0, msSum = 0, msN = 0;
    for (let s = a; s <= b; s++) {
      const e = map.get(s);
      if (!e) continue;
      measured++;
      const c = classify(e);
      cls = worstClass(cls, c);
      if (c === 'red') fail++;
      if (c === 'orange') slowCount++;
      if (typeof e.ms === 'number' && e.ok) { msSum += e.ms; msN++; }
    }
    const bar = document.createElement('div');
    bar.className = 'bar' + (cls ? ' ' + cls : '');
    let tip;
    if (slotsPerBar === 1) {
      const e = map.get(a);
      tip = e ? `${fmtTime(a)}\n${lastFmt(e)}` : `${fmtTime(a)}\nnot monitored`;
    } else {
      const span = `${fmtTime(a)} – ${fmtTime(b)}`;
      if (measured === 0) {
        tip = `${span}\nnot monitored`;
      } else {
        const parts = [`${measured}/${slotsPerBar} measured`];
        if (fail) parts.push(`${fail} fail`);
        if (slowCount) parts.push(`${slowCount} slow`);
        if (msN) parts.push(`avg ${Math.round(msSum / msN)} ms`);
        tip = `${span}\n${parts.join(' · ')}`;
      }
    }
    bar.setAttribute('data-tip', tip);
    frag.appendChild(bar);
  }
  barsEl.replaceChildren(frag);

  const last = arr[arr.length - 1];
  const isCurrent = last && last.s === nowSlot;
  const cls = isCurrent ? classify(last) : null;
  dot.className = 'dot' + (cls === 'green' ? ' up' : cls === 'orange' ? ' slow' : cls === 'red' ? ' down' : '');
  statusEl.textContent = cls === 'green' ? 'Up' : cls === 'orange' ? 'Slow' : cls === 'red' ? 'Down' : 'Idle';

  section.querySelector('[data-k="last"]').textContent = last ? lastFmt(last) : '—';
  section.querySelector('[data-k="d1"]').textContent = computeStats(arr, classify, 24 * 60);
  section.querySelector('[data-k="d42"]').textContent = computeStats(arr, classify, RETENTION_MIN);

  return cls;
};

const fmtGoogle = (e) => e.ok ? `${e.ms} ms` : 'fail';
const fmtOnline = (e) => e.ok ? 'online' : 'offline';

const render = () => {
  const range = getRange();
  document.querySelectorAll('.range button').forEach(b => {
    b.classList.toggle('active', b.dataset.range === range);
  });
  const gCls = renderGraph('g-google', data.google, classifyGoogle, fmtGoogle, range);
  const oCls = renderGraph('g-online', data.online, classifyOnline, fmtOnline, range);
  const down = gCls === 'red' || oCls === 'red';
  const baseTitle = 'Net Monitor';
  document.title = down ? '⚠ DOWN — ' + baseTitle : baseTitle;
};

document.querySelectorAll('.range button').forEach(b => {
  b.addEventListener('click', () => {
    setRange(b.dataset.range);
    render();
  });
});

render();
tick();
setInterval(tick, MIN);

let resizeRaf;
window.addEventListener('resize', () => {
  cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(render);
});

window.addEventListener('online', render);
window.addEventListener('offline', render);
document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
</script>
</body>
</html>
